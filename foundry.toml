[profile.default]
src = "contracts"
out = "contracts/out"
libs = ["lib"]

# Solidity compiler settings
solc_version = "0.8.20"

# Testing
via_ir = true

# Optimizer
optimizer = true
optimizer_runs = 200

gas_reports = ["*"]

# EVM version
evm_version = "paris"

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
mainnet = "${MAINNET_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
mainnet = { key = "${ETHERSCAN_API_KEY}" }